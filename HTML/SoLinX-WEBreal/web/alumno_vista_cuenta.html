<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoLinX — Mi Cuenta</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="alumno_menu_empresas.html" title="Regresar" style="display:flex;align-items:center;">
                <img src="assets/img/icono_salida.png" alt="Regresar" style="width:32px;height:32px;opacity:0.7;">
            </a>
            <img src="assets/img/solinx_logo.png" alt="SoLinX" class="logo">
            <span class="spacer"></span>
            <div class="user-info">
                <span class="boleta" id="tvBoleta">2023XXXX</span>
                <img src="assets/img/imagen_prederterminada.png" alt="Perfil" class="avatar" id="imgPerfil">
            </div>
        </div>
        <div class="bar-divider"></div>

        <!-- Content -->
        <div class="page-content">
            <div class="container" style="max-width:700px;">

                <!-- Modo -->
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
                    <span class="section-title" style="margin:0;">Modo</span>
                    <div class="theme-toggle">
                        <div class="theme-dot light" data-theme="light" onclick="setTheme('light')"></div>
                        <div class="theme-dot dark" data-theme="dark" onclick="setTheme('dark')"></div>
                    </div>
                </div>

                <!-- Info del Alumnado -->
                <h3 class="section-title">Información del alumnado</h3>
                <div style="margin-bottom:32px;">
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Nombre:</span>
                        <span id="tvNombre" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Correo:</span>
                        <span id="tvCorreo" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Escuela:</span>
                        <span id="tvEscuela" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Carrera:</span>
                        <span id="tvCarrera" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                </div>

                <!-- Status de Solicitudes -->
                <h3 class="section-title">Status de solicitudes</h3>
                <div id="tvPuntosStatus" style="color:var(--color-text-secondary); margin-bottom:32px; line-height:1.8;">
                    Cargando solicitudes...
                </div>

                <!-- Mi Horario -->
                <h3 class="section-title">Mi Horario</h3>
                <div style="height:2px; background:var(--color-primary); margin-bottom:4px; border-radius:1px;"></div>
                <div class="horario-table" id="horarioTable">
                    <!-- Filled by JS -->
                </div>
            </div>
        </div>

        <!-- Footer: Cerrar Sesión -->
        <div class="footer-action">
            <button class="logout-link" onclick="clearSession()">Cerrar Sesión</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        var session = requireSession('alumno');
        if (session) {
            document.getElementById('tvBoleta').textContent = session.boleta || '2023XXXX';
        }

        // TODO: fetch from GET /api/alumnos/{boleta}
        var alumno = {
            nombre: 'Carlos Ramírez López',
            correo: 'cramirez@alumno.ipn.mx',
            escuela: 'ESCOM',
            carrera: 'Ing. en Sistemas Computacionales',
            solicitudes: [
                { proyecto: 'Sistema IoT Industrial', estado: 'Enviada' },
                { proyecto: 'Dashboard Energías', estado: 'Aprobada' }
            ],
            horario: {
                Lunes: '07:00 — 13:00',
                Martes: '07:00 — 13:00',
                'Miércoles': '07:00 — 13:00',
                Jueves: '07:00 — 13:00',
                Viernes: '07:00 — 11:00',
                'Sábado': 'Sin clase',
                Domingo: 'Sin clase'
            }
        };

        document.getElementById('tvNombre').textContent = alumno.nombre;
        document.getElementById('tvCorreo').textContent = alumno.correo;
        document.getElementById('tvEscuela').textContent = alumno.escuela;
        document.getElementById('tvCarrera').textContent = alumno.carrera;

        // Status solicitudes
        var statusHtml = '';
        alumno.solicitudes.forEach(function(s) {
            var badgeClass = s.estado === 'Aprobada' ? 'estado-aprobada' : s.estado === 'Rechazada' ? 'estado-rechazada' : 'estado-pendiente';
            statusHtml += '• ' + s.proyecto + ' — <span class="estado-badge ' + badgeClass + '">' + s.estado + '</span><br>';
        });
        document.getElementById('tvPuntosStatus').innerHTML = statusHtml || 'Sin solicitudes.';

        // Horario
        var horarioHtml = '';
        var dias = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
        dias.forEach(function(dia) {
            var valor = alumno.horario[dia] || 'Sin clase';
            horarioHtml += '<div class="horario-row"><span class="dia-label">' + dia + '</span><span class="dia-value">' + valor + '</span></div>';
        });
        document.getElementById('horarioTable').innerHTML = horarioHtml;
    </script>
</body>
</html>
