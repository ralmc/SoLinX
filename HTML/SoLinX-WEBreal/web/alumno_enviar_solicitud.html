<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoLinX — Enviar Solicitud</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .detail-img { width:200px; height:200px; object-fit:contain; display:block; margin:0 auto 20px; border-radius:var(--radius-md); background:var(--color-surface-variant); }
        .detail-row { margin-bottom:8px; font-size:0.92rem; color:var(--color-text-secondary); }
        .detail-row strong { color:var(--color-on-surface); }
        .send-btn { display:block; width:100%; padding:16px; text-align:center; font-size:1.1rem; font-weight:700; color:var(--color-on-primary); background:linear-gradient(90deg,var(--color-primary),var(--color-secondary)); border:none; border-radius:var(--radius-sm); cursor:pointer; margin-top:24px; transition:opacity 0.2s; }
        .send-btn:hover { opacity:0.9; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="alumno_menu_empresas.html" style="display:flex;align-items:center;">
                <img src="assets/img/flechaizq.png" alt="Regresar" style="width:28px;height:28px;opacity:0.7;">
            </a>
            <a href="index.html"><img src="assets/img/solinx_logo.png" alt="SoLinX" class="logo"></a>
            <span class="spacer"></span>
            <div class="user-info">
                <span class="boleta" id="tvBoleta">BOLETA</span>
                <img src="assets/img/imagen_prederterminada.png" alt="Perfil" class="avatar" onclick="window.location.href='alumno_vista_cuenta.html'" style="cursor:pointer" title="Ver mi perfil">
            </div>
        </div>
        <div class="bar-divider"></div>

        <!-- Content -->
        <div class="page-content">
            <div class="container" style="max-width:600px;">
                <div class="card">
                    <div class="card-body">
                        <img id="imgLogo" src="assets/img/solinx_logo.png" alt="Proyecto" class="detail-img">

                        <div class="detail-row"><strong>Empresa:</strong> <span id="txtEmpresa">—</span></div>
                        <div class="detail-row"><strong>Proyecto:</strong> <span id="txtProyecto">—</span></div>
                        <div class="detail-row">Fecha Inicio: <span id="fechini">—</span></div>
                        <div class="detail-row">Fecha Término: <span id="fechfin">—</span></div>
                        <div class="detail-row">Carrera Enfocada: <span id="txtCarrera">—</span></div>
                        <div class="detail-row">Teléfono: <span id="telefono">—</span></div>
                        <div class="detail-row">Vacantes: <span id="vacantes">—</span></div>
                        <div class="detail-row">Ubicación: <span id="ubicacion">—</span></div>
                        <div class="detail-row">Objetivo: <span id="objetivo">—</span></div>

                        <button class="send-btn" onclick="enviarSolicitud()">ENVIAR SOLICITUD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        var session = requireSession('alumno');
        if (session) document.getElementById('tvBoleta').textContent = session.boleta || 'BOLETA';

        // TODO: fetch from GET /api/proyectos/{id}
        var proyecto = {
            empresa: 'TechNova Solutions',
            nombre: 'Sistema IoT Industrial',
            fechaInicio: '01/02/2026',
            fechaFin: '01/08/2026',
            carrera: 'Ing. en Sistemas Computacionales',
            telefono: '+52 55 1234 5678',
            vacantes: 5,
            ubicacion: 'Ciudad de México',
            objetivo: 'Crear un sistema de monitoreo industrial con sensores IoT para automatización de procesos en plantas manufactureras.'
        };

        document.getElementById('txtEmpresa').textContent = proyecto.empresa;
        document.getElementById('txtProyecto').textContent = proyecto.nombre;
        document.getElementById('fechini').textContent = proyecto.fechaInicio;
        document.getElementById('fechfin').textContent = proyecto.fechaFin;
        document.getElementById('txtCarrera').textContent = proyecto.carrera;
        document.getElementById('telefono').textContent = proyecto.telefono;
        document.getElementById('vacantes').textContent = proyecto.vacantes;
        document.getElementById('ubicacion').textContent = proyecto.ubicacion;
        document.getElementById('objetivo').textContent = proyecto.objetivo;

        function enviarSolicitud() {
            // TODO: POST /api/solicitudes
            showToast('Solicitud enviada exitosamente.', 'success');
            setTimeout(function() { window.location.href = 'alumno_menu_empresas.html'; }, 1500);
        }
    </script>
</body>
</html>
