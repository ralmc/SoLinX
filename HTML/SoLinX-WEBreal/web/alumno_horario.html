<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoLinX — Registrar Horario</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .horario-page { max-width:600px; margin:0 auto; padding:24px; }
        .horario-page-title { font-family:'Quicksand',sans-serif; font-size:2rem; font-weight:800; text-align:center; margin-bottom:32px; color:var(--color-on-background); }
        .dia-block { margin-bottom:24px; padding:16px; border-radius:var(--radius-md); background:var(--color-surface-variant); }
        .dia-name { font-family:'Quicksand',sans-serif; font-size:1.15rem; font-weight:700; color:var(--color-primary); margin-bottom:12px; }
        .dia-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .dia-row .time-group { flex:1; min-width:120px; }
        .dia-row .time-group label { font-size:0.8rem; color:var(--color-text-secondary); display:block; margin-bottom:4px; }
        .dia-row .dash { color:var(--color-text-secondary); font-size:1.2rem; }
        .dia-row .libre-check { display:flex; align-items:center; gap:6px; font-size:0.85rem; color:var(--color-text-secondary); }
        .dia-row .libre-check input { accent-color:var(--color-primary); }
        .submit-area { text-align:center; margin-top:24px; }
        .submit-area .submit-btn {
            font-family:'Quicksand',sans-serif; font-size:1.8rem; font-weight:800;
            color:var(--color-on-background); background:none; border:none; cursor:pointer;
            padding:4px 16px; transition:color 0.18s;
        }
        .submit-area .submit-btn:hover { color:var(--color-primary); }
        .submit-area .submit-line { width:180px; height:4px; background:var(--color-on-background); border-radius:2px; margin:4px auto 0; }
    </style>
</head>
<body>
    <div class="horario-page">
        <h1 class="horario-page-title">Registrar Horario</h1>

        <div id="diasContainer"></div>

        <div class="submit-area">
            <button class="submit-btn" onclick="enviarHorario()">Enviar</button>
            <div class="submit-line"></div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        var dias = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
        var horas = ['Sin clase','06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];

        function buildOptions() {
            return horas.map(function(h) { return '<option value="' + h + '">' + h + '</option>'; }).join('');
        }

        var container = document.getElementById('diasContainer');
        var html = '';
        dias.forEach(function(dia, i) {
            html += '<div class="dia-block">' +
                '<div class="dia-name">' + dia + '</div>' +
                '<div class="dia-row">' +
                '<div class="time-group"><label>Inicio</label><select class="form-control" id="inicio_' + i + '">' + buildOptions() + '</select></div>' +
                '<span class="dash">—</span>' +
                '<div class="time-group"><label>Final</label><select class="form-control" id="final_' + i + '">' + buildOptions() + '</select></div>' +
                '<label class="libre-check"><input type="checkbox" id="libre_' + i + '" onchange="toggleLibre(' + i + ')"> Libre</label>' +
                '</div></div>';
        });
        container.innerHTML = html;

        function toggleLibre(i) {
            var libre = document.getElementById('libre_' + i).checked;
            document.getElementById('inicio_' + i).disabled = libre;
            document.getElementById('final_' + i).disabled = libre;
            if (libre) {
                document.getElementById('inicio_' + i).value = 'Sin clase';
                document.getElementById('final_' + i).value = 'Sin clase';
            }
        }

        function enviarHorario() {
            var horario = {};
            dias.forEach(function(dia, i) {
                var inicio = document.getElementById('inicio_' + i).value;
                var fin = document.getElementById('final_' + i).value;
                horario[dia] = (inicio === 'Sin clase') ? 'Sin clase' : inicio + ' — ' + fin;
            });
            // TODO: POST /api/alumnos/horario
            console.log('Horario:', horario);
            showToast('Horario registrado exitosamente.', 'success');
            setTimeout(function() { window.location.href = 'alumno_vista_cuenta.html'; }, 1500);
        }
    </script>
</body>
</html>
