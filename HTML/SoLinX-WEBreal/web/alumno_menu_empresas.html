<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoLinX — Proyectos</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="index.html"><img src="assets/img/solinx_logo.png" alt="SoLinX" class="logo"></a>
            <span class="spacer"></span>
            <div class="user-info">
                <span class="boleta" id="tvBoleta">BOLETA</span>
                <img src="assets/img/imagen_prederterminada.png" alt="Perfil" class="avatar"
                     onclick="window.location.href='alumno_vista_cuenta.html'" style="cursor:pointer" title="Ver mi cuenta">
            </div>
        </div>
        <div class="bar-divider"></div>

        <!-- Content -->
        <div class="page-content">
            <div class="container">
                <div id="projectList"></div>
                <div id="emptyState" class="empty-state" style="display:none;">
                    <div class="empty-icon">📋</div>
                    <p>No hay proyectos disponibles</p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        var session = requireSession('alumno');
        if (session) {
            document.getElementById('tvBoleta').textContent = session.boleta || 'BOLETA';
        }

        // Demo data — TODO: fetch from GET /api/proyectos
        var proyectos = [
            { id:1, empresa:'TechNova Solutions', proyecto:'Sistema IoT Industrial', carrera:'Ing. en Sistemas Computacionales', fechaInicio:'01/02/2026', fechaFin:'01/08/2026', vacantes:5, img:'assets/img/solinx_logo.png' },
            { id:2, empresa:'GreenEnergy MX', proyecto:'Dashboard Energías Renovables', carrera:'Ing. en Software', fechaInicio:'15/03/2026', fechaFin:'15/09/2026', vacantes:3, img:'assets/img/solinx_logo.png' },
            { id:3, empresa:'DataCore Analytics', proyecto:'Plataforma de Big Data', carrera:'Ciencia de Datos', fechaInicio:'01/04/2026', fechaFin:'01/10/2026', vacantes:2, img:'assets/img/solinx_logo.png' },
        ];

        function renderProjects() {
            var container = document.getElementById('projectList');
            var empty = document.getElementById('emptyState');

            if (proyectos.length === 0) {
                empty.style.display = 'block';
                return;
            }

            var html = '';
            proyectos.forEach(function(p) {
                html += '<div class="card card-clickable" style="margin-bottom:16px;" onclick="verDetalles(' + p.id + ')">' +
                    '<div class="project-card">' +
                    '<img src="' + p.img + '" alt="' + p.empresa + '" class="project-img">' +
                    '<div class="project-info">' +
                    '<span class="project-name">' + p.empresa + '</span>' +
                    '<span class="project-meta">Fecha: ' + p.fechaInicio + ' — ' + p.fechaFin + '</span>' +
                    '<span class="project-meta">Carrera: ' + p.carrera + '</span>' +
                    '<span class="project-vacantes">Vacantes disponibles: ' + p.vacantes + '</span>' +
                    '<span class="project-link">VER DETALLES →</span>' +
                    '</div></div></div>';
            });
            container.innerHTML = html;
        }

        function verDetalles(id) {
            window.location.href = 'alumno_enviar_solicitud.html?id=' + id;
        }

        renderProjects();
    </script>
</body>
</html>
