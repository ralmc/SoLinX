<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoLinX — Perfil Empresa</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="empresa_vista_menu.html" style="display:flex;align-items:center;">
                <img src="assets/img/flechaizq.png" alt="Regresar" style="width:28px;height:28px;opacity:0.7;">
            </a>
            <a href="index.html"><img src="assets/img/solinx_logo.png" alt="SoLinX" class="logo"></a>
            <span class="spacer"></span>
            <div class="user-info">
                <img src="assets/img/imagen_prederterminada.png" alt="Perfil" class="avatar">
            </div>
        </div>
        <div class="bar-divider"></div>

        <!-- Content -->
        <div class="page-content">
            <div class="container" style="max-width:700px;">

                <!-- Modo -->
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
                    <span class="section-title" style="margin:0;">Modo</span>
                    <div class="theme-toggle">
                        <div class="theme-dot light" data-theme="light" onclick="setTheme('light')"></div>
                        <div class="theme-dot dark" data-theme="dark" onclick="setTheme('dark')"></div>
                    </div>
                </div>

                <!-- Info de la Empresa -->
                <h3 class="section-title">Información de la empresa</h3>
                <div style="margin-bottom:32px;">
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Nombre:</span>
                        <span id="tvNombre" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Correo:</span>
                        <span id="tvCorreo" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Teléfono:</span>
                        <span id="tvTelefono" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        <span style="font-weight:700;color:var(--color-primary);">Proyectos publicados:</span>
                        <span id="tvProyectos" style="color:var(--color-text-secondary);">Cargando...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer: Cerrar Sesión -->
        <div class="footer-action">
            <button class="logout-link" onclick="clearSession()">Cerrar Sesión</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        var session = requireSession('empresa');

        // TODO: fetch from GET /api/empresas/{id}
        var empresa = {
            nombre: 'TechNova Solutions',
            correo: 'contacto@technova.mx',
            telefono: '+52 55 9876 5432',
            proyectos: 2
        };

        document.getElementById('tvNombre').textContent = empresa.nombre;
        document.getElementById('tvCorreo').textContent = empresa.correo;
        document.getElementById('tvTelefono').textContent = empresa.telefono;
        document.getElementById('tvProyectos').textContent = empresa.proyectos;
    </script>
</body>
</html>
