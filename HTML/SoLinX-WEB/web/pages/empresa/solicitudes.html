<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoLinX — Solicitudes</title>
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" style="background:transparent;padding:0;"><img src="../../img/logo_sf.png" alt="SoLinX" style="width:36px;height:36px;object-fit:contain;border-radius:6px;"></div>
      <span class="sidebar-logo-text">SoLinX</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Empresa</div>
      <a class="sidebar-link" href="dashboard.html">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Mis Proyectos
      </a>
      <a class="sidebar-link active" href="solicitudes.html">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Solicitudes
      </a>
      <div class="sidebar-section-label" style="margin-top:1rem">Mi cuenta</div>
      <a class="sidebar-link" href="cuenta.html">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi Perfil
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" id="sidebarAvatar" style="background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarNombre">Cargando...</div>
          <div class="sidebar-user-role">Empresa</div>
        </div>
      </div>
      <button class="btn btn-outline w-full" id="btn-logout" style="margin-top:.5rem;font-size:.8rem">Cerrar sesión</button>
    </div>
  </aside>

  <main class="app-main">
    <header class="app-topbar">
      <div class="topbar-title">Solicitudes de Alumnos</div>
      <div class="topbar-actions">
        <button class="btn-icon" id="themeBtn">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <div class="app-content">
      <div class="card">
        <div class="card-header">
          <h3>Solicitudes de Alumnos</h3>
          <button class="btn btn-outline btn-sm" onclick="cargarSolicitudes()">↻ Actualizar</button>
        </div>
        <div class="card-body table-wrap">
          <div id="tablaContainer">
            <div class="loader-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { Api }   from '../../js/api.js';
  import { Session, requireAuth, logout } from '../../js/auth.js';
  import { toast, initTheme, toggleTheme, showLoader, badgeEstado, confirmDialog } from '../../js/utils.js';

  requireAuth('empresa');
  initTheme();

  const idEmpresa = Session.idEmpresa;
  document.getElementById('sidebarNombre').textContent = Session.nombre;
  document.getElementById('sidebarAvatar').textContent = Session.initials();
  document.getElementById('btn-logout').onclick = () => logout();
  document.getElementById('themeBtn').onclick   = () => toggleTheme();

  window.cargarSolicitudes = async function() {
    const container = document.getElementById('tablaContainer');
    showLoader(container);
    try {
      const res = await Api.getSolicitudesPorEmpresa(idEmpresa);
      if (!res.ok) throw new Error('Error ' + res.status);
      const todas = await res.json();

      // Empresa solo ve las que el supervisor ya aprobó
      const lista = todas.filter(s =>
        s.estadoSolicitud?.toLowerCase() === 'aprobada_supervisor'
      );

      renderTabla(lista, todas, container);
    } catch (e) {
      container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${e.message}</p></div>`;
    }
  };

  function renderTabla(lista, todas, container) {
    // Mostrar también las ya procesadas (aceptada, rechazada_empresa) como historial
    const historial = todas.filter(s => {
      const estado = s.estadoSolicitud?.toLowerCase();
      return estado === 'aceptada' || estado === 'rechazada_empresa';
    });

    if (!lista.length && !historial.length) {
      container.innerHTML = `<div class="empty-state"><h3>Sin solicitudes por revisar</h3><p>Cuando el supervisor apruebe solicitudes aparecerán aquí</p></div>`;
      return;
    }

    const renderFila = (s, conBotones) => `
      <tr>
        <td><strong>${s.nombreEstudiante ?? 'N/A'}</strong><br><span class="text-xs text-muted">${s.correoEstudiante ?? ''}</span></td>
        <td>${s.nombreProyecto ?? 'N/A'}</td>
        <td>${badgeEstado(s.estadoSolicitud)}</td>
        <td>
          <div class="flex gap-2">
            ${conBotones ? `
              <button class="btn btn-success btn-sm"
                onclick="cambiarEstado(${s.idSolicitud},'aceptada','${(s.nombreEstudiante ?? '').replace(/'/g,"\\'")}',${s.boletaAlumno},'${(s.nombreProyecto ?? '').replace(/'/g,"\\'")}')">
                Aceptar
              </button>
              <button class="btn btn-danger btn-sm"
                onclick="cambiarEstado(${s.idSolicitud},'rechazada_empresa','${(s.nombreEstudiante ?? '').replace(/'/g,"\\'")}',${s.boletaAlumno})">
                Rechazar
              </button>` : ''}
            ${s.correoEstudiante ? `
              <button class="btn btn-outline btn-sm"
                onclick="contactarAlumno('${s.correoEstudiante}','${(s.nombreEstudiante ?? '').replace(/'/g,"\\'")}','${(s.nombreProyecto ?? '').replace(/'/g,"\\'")}')">
                ✉️ Contactar
              </button>` : ''}
          </div>
        </td>
      </tr>`;

    container.innerHTML = `
      <table class="table">
        <thead>
          <tr>
            <th>Alumno</th>
            <th>Proyecto</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(s => renderFila(s, true)).join('')}
          ${historial.map(s => renderFila(s, false)).join('')}
        </tbody>
      </table>`;
  }

  window.cambiarEstado = async function(idSolicitud, nuevoEstado, nombre, boleta, nombreProyecto) {
    const accion = nuevoEstado === 'aceptada' ? 'aceptar' : 'rechazar';
    const ok = await confirmDialog('Confirmar', `¿Deseas ${accion} la solicitud de ${nombre}?`);
    if (!ok) return;
    try {
      const res = await Api.actualizarEstadoSolicitud(idSolicitud, nuevoEstado);
      if (res.ok) {
        // ─── Notificación al alumno ───────────────────────
        try {
          const resU = await Api.getIdUsuarioPorBoleta(boleta);
          if (resU.ok) {
            const { idUsuario } = await resU.json();
            const aceptada = nuevoEstado === 'aceptada';
            await Api.crearNotificacion(
              idUsuario,
              aceptada ? '¡Felicidades! Fuiste aceptado en un proyecto 🎉' : 'Solicitud no aceptada por la empresa',
              aceptada
                ? `La empresa ${Session.nombre} aceptó tu solicitud en el proyecto ${nombreProyecto}. ¡Ya puedes subir tus documentos!`
                : `La empresa ${Session.nombre} no aceptó tu solicitud en este momento. Puedes postularte a otro proyecto.`
            );
          }
        } catch {}
        toast(nuevoEstado === 'aceptada'
          ? '¡Alumno aceptado en el proyecto! ✓'
          : 'Solicitud rechazada', 'success');
        cargarSolicitudes();
      } else {
        toast('Error: ' + res.status, 'error');
      }
    } catch (e) { toast(e.message, 'error'); }
  };

  window.contactarAlumno = function(correo, nombre, proyecto) {
    const subject = encodeURIComponent(`SoLinX - Proyecto: ${proyecto}`);
    const body = encodeURIComponent(`Hola ${nombre},\n\nTe contactamos desde SoLinX en relación al proyecto "${proyecto}".\n\nSaludos,\n${Session.nombre}`);
    window.open(`mailto:${correo}?subject=${subject}&body=${body}`, '_blank');
  };

  cargarSolicitudes();
</script>
</body>
</html>
