<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoLinX — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#e8f7fb 0%,#f4f7f9 50%,#e8f7fb 100%); }
    [data-theme="dark"] body { background:linear-gradient(135deg,#0d1117 0%,#161b22 100%); }
    .auth-wrap { width:100%; max-width:460px; padding:1rem; }
    .auth-logo  { text-align:center; margin-bottom:2rem; }
    .auth-logo-icon { width:64px;height:64px;background:var(--brand);border-radius:var(--radius);
      display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);
      font-weight:800;font-size:1.5rem;color:#fff;margin-bottom:.75rem;
      box-shadow:0 8px 24px rgba(20,151,185,.3); }
    .auth-logo-name { display:block;font-family:var(--font-display);font-weight:800;font-size:1.75rem;color:var(--brand); }
    .auth-logo-sub  { display:block;font-size:.8rem;color:var(--text-3);margin-top:.1rem; }
    .auth-card { background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden; }
    .auth-tabs { display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border); }
    .auth-tab  { padding:1rem;text-align:center;font-size:.8rem;font-weight:600;color:var(--text-3);
      border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--transition);cursor:pointer; }
    .auth-tab:hover { color:var(--text-2); }
    .auth-tab.active { color:var(--brand);border-bottom-color:var(--brand); }
    .auth-panel { display:none;padding:2rem; }
    .auth-panel.active { display:block; }
    .auth-footer { text-align:center;padding:1.25rem;border-top:1px solid var(--border);
      background:var(--surface-2);font-size:.8rem;color:var(--text-3); }
    .btn-block { width:100%;justify-content:center; }
    .theme-btn { position:fixed;top:1rem;right:1rem;width:38px;height:38px;border-radius:var(--radius-sm);
      background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;
      justify-content:center;color:var(--text-2);cursor:pointer;transition:all var(--transition); }
    .theme-btn:hover { border-color:var(--brand);color:var(--brand); }
    .verificacion-banner { background:var(--brand-light);border:1px solid var(--brand);border-radius:var(--radius-sm);
      padding:.85rem 1rem;margin-bottom:1rem;font-size:.85rem;color:var(--brand);display:none; }
    .link-text { color:var(--brand);cursor:pointer;font-weight:600;text-decoration:underline; }
  </style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="Cambiar tema">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon">SL</div>
    <span class="auth-logo-name">SoLinX</span>
    <span class="auth-logo-sub">Plataforma de Servicio Social — IPN</span>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" data-panel="login">Iniciar Sesión</div>
      <div class="auth-tab" data-panel="reg-alumno">Alumno</div>
      <div class="auth-tab" data-panel="reg-empresa">Empresa</div>
    </div>

    <!-- LOGIN -->
    <div class="auth-panel active" id="panel-login">
      <div class="verificacion-banner" id="bannerVerificacion">
        ⚠️ Tu cuenta no está verificada. Revisa tu correo o
        <span class="link-text" id="linkReenviar">reenvía el correo de verificación</span>.
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="login-correo" placeholder="correo@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-group" style="margin-top:1.5rem">
        <button class="btn btn-primary btn-block btn-lg" id="btn-login">Entrar</button>
      </div>
    </div>

    <!-- REGISTRO ALUMNO -->
    <div class="auth-panel" id="panel-reg-alumno">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input class="form-input" type="text" id="ra-nombre" placeholder="Tu nombre completo">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Boleta (10 dígitos)</label>
          <input class="form-input" type="number" id="ra-boleta" placeholder="2020XXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono (10 dígitos)</label>
          <input class="form-input" type="tel" id="ra-telefono" placeholder="5500000000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Escuela</label>
          <select class="form-select" id="ra-escuela">
            <option value="">Selecciona...</option>
            <option>ESCOM</option><option>UPIICSA</option><option>UPIITA</option>
            <option>ESIA Ticomán</option><option>ESIA Tecamachalco</option>
            <option>ESIME Azcapotzalco</option><option>ESIME Zacatenco</option>
            <option>CECyT 9</option><option>UPIBI</option><option>UPIIG</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Carrera</label>
          <select class="form-select" id="ra-carrera">
            <option value="">Selecciona...</option>
            <option>Ingeniería en Sistemas Computacionales</option>
            <option>Ingeniería en Software</option>
            <option>Ingeniería Industrial</option>
            <option>Ingeniería Mecatrónica</option>
            <option>Ingeniería Informática</option>
            <option>Ingeniería en Inteligencia Artificial</option>
            <option>Ingeniería Aeronáutica</option>
            <option>Ingeniería Biónica</option>
            <option>Programación</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="ra-correo" placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar correo</label>
        <input class="form-input" type="email" id="ra-correo2" placeholder="Repite tu correo">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contraseña (mín. 4 caracteres)</label>
          <input class="form-input" type="password" id="ra-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar contraseña</label>
          <input class="form-input" type="password" id="ra-pass2" placeholder="Repite">
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="btn-reg-alumno" style="margin-top:.5rem">Registrar Alumno</button>
      <p style="text-align:center;margin-top:.75rem;font-size:.78rem;color:var(--text-3)">
        ¿Ya tienes cuenta? <span class="link-text" onclick="switchTab('login')">Inicia sesión</span>
      </p>
    </div>

    <!-- REGISTRO EMPRESA -->
    <div class="auth-panel" id="panel-reg-empresa">
      <div class="form-group">
        <label class="form-label">Nombre de la empresa</label>
        <input class="form-input" type="text" id="re-nombre" placeholder="Nombre legal de la empresa">
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="re-correo" placeholder="empresa@ejemplo.com">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar correo</label>
        <input class="form-input" type="email" id="re-correo2" placeholder="Repite el correo">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono (10 dígitos)</label>
        <input class="form-input" type="tel" id="re-telefono" placeholder="5500000000">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" type="password" id="re-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar contraseña</label>
          <input class="form-input" type="password" id="re-pass2" placeholder="Repite">
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="btn-reg-empresa" style="margin-top:.5rem">Registrar Empresa</button>
      <p style="font-size:.75rem;color:var(--text-3);margin-top:.75rem;text-align:center">
        Tu cuenta será revisada por un supervisor antes de ser activada.
      </p>
    </div>

    <div class="auth-footer">SoLinX &copy; 2025 — Servicio Social IPN</div>
  </div>
</div>

<script type="module">
  import { Api }  from './js/api.js';
  import { Session } from './js/auth.js';
  import { toast, initTheme, toggleTheme } from './js/utils.js';

  // Tema
  initTheme();
  document.getElementById('themeBtn').onclick = () => toggleTheme();

  // Si ya hay sesión activa, redirigir
  if (Session.isLoggedIn()) redirigirPorRol(Session.rol);

  // Tabs
  window.switchTab = function(panel) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`[data-panel="${panel}"]`).classList.add('active');
    document.getElementById(`panel-${panel}`).classList.add('active');
  };
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.panel);
  });

  // LOGIN
  let correoUltimoLogin = '';
  document.getElementById('btn-login').onclick = async () => {
    const correo = document.getElementById('login-correo').value.trim();
    const pass   = document.getElementById('login-pass').value.trim();
    if (!correo) { toast('Ingresa tu correo', 'error'); return; }
    if (!pass)   { toast('Ingresa tu contraseña', 'error'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Entrando...';
    document.getElementById('bannerVerificacion').style.display = 'none';

    try {
      const res = await Api.login(correo, pass);
      if (res.status === 401) {
        // Puede ser credenciales mal O cuenta no verificada
        try {
          const errBody = await res.clone().json().catch(() => null);
          if (errBody && JSON.stringify(errBody).toLowerCase().includes('verif')) {
            correoUltimoLogin = correo;
            document.getElementById('bannerVerificacion').style.display = 'block';
          } else {
            toast('Correo o contraseña incorrectos', 'error');
          }
        } catch {
          toast('Correo o contraseña incorrectos', 'error');
        }
        return;
      }
      if (!res.ok) { toast('Error al conectar con el servidor (' + res.status + ')', 'error'); return; }
      const data = await res.json();
      Session.save(data);
      toast('¡Bienvenido, ' + data.nombre + '!', 'success');
      setTimeout(() => redirigirPorRol(data.rol), 700);
    } catch (e) {
      toast('Sin conexión: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  };

  // Enter en inputs de login
  ['login-correo','login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  });

  // Reenviar verificación
  document.getElementById('linkReenviar').onclick = async () => {
    if (!correoUltimoLogin) { toast('Ingresa tu correo primero', 'error'); return; }
    try {
      const res = await Api.reenviarVerificacion(correoUltimoLogin);
      if (res.ok) toast('Correo de verificación reenviado ✓', 'success');
      else toast('Error al reenviar: ' + res.status, 'error');
    } catch (e) { toast('Error de red: ' + e.message, 'error'); }
  };

  // REGISTRO ALUMNO
  document.getElementById('btn-reg-alumno').onclick = async () => {
    const nombre  = document.getElementById('ra-nombre').value.trim();
    const boleta  = document.getElementById('ra-boleta').value.trim();
    const tel     = document.getElementById('ra-telefono').value.trim();
    const escuela = document.getElementById('ra-escuela').value;
    const carrera = document.getElementById('ra-carrera').value;
    const correo  = document.getElementById('ra-correo').value.trim();
    const correo2 = document.getElementById('ra-correo2').value.trim();
    const pass    = document.getElementById('ra-pass').value.trim();
    const pass2   = document.getElementById('ra-pass2').value.trim();

    if (!nombre)              { toast('Ingresa tu nombre', 'error'); return; }
    if (boleta.length !== 10) { toast('La boleta debe tener 10 dígitos', 'error'); return; }
    if (!escuela)             { toast('Selecciona una escuela', 'error'); return; }
    if (!carrera)             { toast('Selecciona una carrera', 'error'); return; }
    if (!correo.includes('@')){ toast('Correo no válido', 'error'); return; }
    if (correo !== correo2)   { toast('Los correos no coinciden', 'error'); return; }
    if (pass.length < 4)      { toast('Mínimo 4 caracteres en la contraseña', 'error'); return; }
    if (pass !== pass2)       { toast('Las contraseñas no coinciden', 'error'); return; }

    const btn = document.getElementById('btn-reg-alumno');
    btn.disabled = true; btn.textContent = 'Registrando...';
    try {
      const res = await Api.registrarAlumno({
        nombre, boleta: parseInt(boleta), carrera, escuela,
        correo, contrasena: pass, telefono: tel
      });
      if (res.ok) {
        toast('¡Cuenta creada! Ahora registra tu horario disponible.', 'success');
        sessionStorage.setItem('sl_reg_boleta', boleta);
        setTimeout(() => { window.location.href = 'pages/alumno/horario.html'; }, 900);
      } else if (res.status === 409) {
        toast('El correo o boleta ya están registrados', 'error');
      } else {
        toast('Error al registrar: ' + res.status, 'error');
      }
    } catch (e) { toast('Error de red: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Registrar Alumno'; }
  };

  // REGISTRO EMPRESA
  document.getElementById('btn-reg-empresa').onclick = async () => {
    const nombre  = document.getElementById('re-nombre').value.trim();
    const correo  = document.getElementById('re-correo').value.trim();
    const correo2 = document.getElementById('re-correo2').value.trim();
    const tel     = document.getElementById('re-telefono').value.trim();
    const pass    = document.getElementById('re-pass').value.trim();
    const pass2   = document.getElementById('re-pass2').value.trim();

    if (!nombre)               { toast('Ingresa el nombre de la empresa', 'error'); return; }
    if (!correo.includes('@')) { toast('Correo no válido', 'error'); return; }
    if (correo !== correo2)    { toast('Los correos no coinciden', 'error'); return; }
    if (tel.length !== 10)     { toast('El teléfono debe tener 10 dígitos', 'error'); return; }
    if (pass.length < 4)       { toast('Mínimo 4 caracteres en la contraseña', 'error'); return; }
    if (pass !== pass2)        { toast('Las contraseñas no coinciden', 'error'); return; }

    const btn = document.getElementById('btn-reg-empresa');
    btn.disabled = true; btn.textContent = 'Registrando...';
    try {
      const res = await Api.registrarEmpresa({ nombreEmpresa: nombre, correo, telefono: tel, password: pass });
      if (res.status === 409) { toast('El correo ya está registrado', 'error'); return; }
      if (res.ok) {
        toast('¡Empresa registrada! Un supervisor revisará tu cuenta.', 'success');
        switchTab('login');
      } else {
        toast('Error al registrar: ' + res.status, 'error');
      }
    } catch (e) { toast('Error de red: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Registrar Empresa'; }
  };

  function redirigirPorRol(rol) {
    const r = rol?.toLowerCase();
    if      (r === 'estudiante') window.location.href = 'pages/alumno/dashboard.html';
    else if (r === 'empresa')    window.location.href = 'pages/empresa/dashboard.html';
    else if (r === 'supervisor') window.location.href = 'pages/supervisor/dashboard.html';
    else toast('Rol no permitido: ' + rol, 'error');
  }
</script>
</body>
</html>
